<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会社別インテリジェンス</title>
    <meta name="theme-color" content="#176b5b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="発表決算">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Daily Company Intelligence</p>
          <h1>発表決算一覧</h1>
          <p id="meta" class="meta">読み込み中...</p>
        </div>

        <section class="date-panel" aria-label="日付選択">
          <label>
            <span>発表日</span>
            <input id="dateInput" type="date">
          </label>
          <div class="date-actions">
            <button id="todayButton" type="button">最新</button>
            <button id="clearDateButton" type="button">全期間</button>
          </div>
          <p id="dateStatus" class="meta">日付を選ぶと、その日にTDnetで開示された決算情報を取得します。</p>
        </section>

        <section class="control-panel" aria-label="表示条件">
          <label>
            <span>並び順</span>
            <select id="sortSelect">
              <option value="impact-desc">市場インパクトが大きい順</option>
              <option value="marketcap-desc">実時価総額が大きい順</option>
              <option value="marketcap-asc">実時価総額が小さい順</option>
              <option value="time-desc">開示時刻が新しい順</option>
              <option value="time-asc">開示時刻が古い順</option>
              <option value="code-asc">証券コード順</option>
              <option value="company-asc">会社名順</option>
            </select>
          </label>

          <label>
            <span>東証17業種</span>
            <select id="industryFilter">
              <option value="all">すべての業種</option>
            </select>
          </label>

          <label>
            <span>市場</span>
            <select id="marketFilter">
              <option value="all">すべての市場</option>
            </select>
          </label>

          <label>
            <span>重要度</span>
            <select id="importanceFilter">
              <option value="all">すべての重要度</option>
              <option value="high">高</option>
              <option value="medium">中</option>
              <option value="low">低</option>
            </select>
          </label>

          <label class="check-row">
            <input id="groupIndustryToggle" type="checkbox">
            <span>業種ごとにまとめる</span>
          </label>
        </section>

        <section class="sidebar-note">
          <h2>データの考え方</h2>
          <p>決算開示はTDnetの開示日を基準にします。業種は東証17業種、インパクトは時価総額または代理変数で並べます。</p>
        </section>
      </aside>

      <main class="detail">
        <section class="toolbar">
          <div>
            <p class="eyebrow">Morning Brief</p>
            <h2 id="pageTitle">発表決算一覧</h2>
          </div>
          <button id="refreshButton" type="button">更新</button>
        </section>

        <section id="overview" class="overview"></section>
        <section id="items" class="items"></section>
      </main>
    </div>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
